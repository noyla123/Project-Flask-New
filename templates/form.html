<!DOCTYPE html>
<html>
<head>
    <title>Kuromi's Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-image: url('https://i.pinimg.com/736x/2b/4f/8c/2b4f8c1e1e8e1e8e1e8e1e8e1e8e1e8e.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 0, 30, 0.55);
            z-index: 0;
        }

        .card {
            background: rgba(20, 5, 45, 0.8);
            border: 2px solid #7c3aed;
            border-radius: 24px;
            padding: 45px 35px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.4);
            backdrop-filter: blur(10px);
        }

        .stars { position: absolute; top: 14px; right: 18px; font-size: 16px; opacity: 0.5; color: #c4b5fd; }
        .bow { font-size: 36px; margin-bottom: 6px; }
        h2 { font-size: 26px; font-weight: 800; color: #e2d4f0; margin-bottom: 6px; letter-spacing: 1px; }
        .subtitle { font-size: 13px; color: #a78bca; margin-bottom: 28px; font-style: italic; }
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #c4b5fd; margin-bottom: 6px; font-weight: 700; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #5b21b6;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.07);
            color: #e2d4f0;
            font-size: 15px;
            font-family: 'Nunito', sans-serif;
            outline: none;
        }
        input:focus { border-color: #a78bca; }
        input::placeholder { color: #7c5fa0; }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Nunito', sans-serif;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <div class="stars">✦ ✦</div>
        <div class="bow">🎀</div>
        <h2>Kuromi's Form</h2>
        <p class="subtitle">~ masukkan nama kamu, nyehehehe ~</p>
        <form method="POST">
            <div class="input-group">
                <label>☆ Nama Depan</label>
                <input type="text" name="namaDepan" placeholder="contoh: Hana" required>
            </div>
            <div class="input-group">
                <label>☆ Nama Belakang</label>
                <input type="text" name="namaBelakang" placeholder="contoh: Sakura" required>
            </div>
            <button type="submit">Kirim ✦</button>
        </form>
    </div>
</body>
</html>
