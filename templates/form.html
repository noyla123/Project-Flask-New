<!DOCTYPE html>
<html>
<head>
    <title>Demo Text</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(212, 83, 126, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            color: #99355a;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 13px;
            color: #c2607e;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #99355a;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #f4c0d1;
            border-radius: 12px;
            background: rgba(255,255,255,0.7);
            color: #4b1528;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #d4537e;
        }

        input::placeholder {
            color: #e093b1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4537e, #99355a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .decoration {
            position: absolute;
            border-radius: 50%;
            background: rgba(212, 83, 126, 0.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌸 Demo Text</h2>
        <p class="subtitle">Masukkan nama kamu di bawah ini</p>
        <form method="POST">
            <div class="input-group">
                <label>Nama Depan</label>
                <input type="text" name="namaDepan" placeholder="contoh: Budi" required>
            </div>
            <div class="input-group">
                <label>Nama Belakang</label>
                <input type="text" name="namaBelakang" placeholder="contoh: Santoso" required>
            </div>
            <button type="submit">Kirim ✨</button>
        </form>
    </div>
</body>
</html>
