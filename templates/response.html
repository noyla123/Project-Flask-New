<!DOCTYPE html>
<html>
<head>
    <title>Hasil Enkripsi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(212, 83, 126, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            color: #99355a;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 13px;
            color: #c2607e;
            margin-bottom: 30px;
        }

        .result-box {
            background: linear-gradient(135deg, #fbeaf0, #f4c0d1);
            border-radius: 16px;
            padding: 24px;
            margin: 20px 0;
            border: 1px solid #f4c0d1;
        }

        .result-label {
            font-size: 13px;
            color: #99355a;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .result-name {
            font-size: 22px;
            font-weight: bold;
            color: #4b1528;
            letter-spacing: 2px;
        }

        .back-btn {
            display: block;
            padding: 14px;
            background: linear-gradient(135deg, #d4537e, #99355a);
            color: white;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 10px;
            width: 100%;
        }

        .back-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌸 Hasil Enkripsi</h2>
        <p class="subtitle">Berikut hasil enkripsi nama kamu</p>
        <div class="result-box">
            <p class="result-label">Nama terenkripsi:</p>
            <p class="result-name">{{ nama }}</p>
        </div>
        <p style="font-size:13px; color:#c2607e; margin-bottom:16px;">
            Selamat datang di pemrograman Python! ✨
        </p>
        <a href="/" class="back-btn">🔙 Kembali</a>
    </div>
</body>
</html>
