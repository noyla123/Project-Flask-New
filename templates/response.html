<!DOCTYPE html>
<html>
<head>
    <title>Hasil Enkripsi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-image: url('/static/bg.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .card {
            background: rgba(255, 230, 240, 0.22);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 18px;
            padding: 52px 48px;
            width: 420px;
            max-width: 90vw;
            border: 1px solid rgba(255, 255, 255, 0.35);
            text-align: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 12.5px;
            color: rgba(255, 255, 255, 0.78);
            margin-bottom: 32px;
            line-height: 1.7;
            font-weight: 300;
        }

        .result-box {
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            padding: 24px 0;
            margin-bottom: 28px;
        }

        .result-label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .result-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: #fff;
            letter-spacing: 5px;
            word-break: break-all;
        }

        .note {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 26px;
            line-height: 1.7;
            font-weight: 300;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.92);
            color: #7a1a40;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .btn:hover { background: #fff; }

        .footer-note {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 20px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Berhasil!</h1>
        <p class="subtitle">Nama baginda telah berhasil dienkripsi</p>
        <div class="result-box">
            <p class="result-label">Nama Terenkripsi</p>
            <p class="result-name">{{ nama }}</p>
        </div>
        <p class="note">Selamat datang di pemrograman Python 🌸</p>
        <a href="/" class="btn">Enkripsi Lagi</a>
        <p class="footer-note">Caesar Cipher · k = 3</p>
    </div>
</body>
</html>
