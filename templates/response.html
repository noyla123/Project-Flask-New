<!DOCTYPE html>
<html>
<head>
    <title>Hasil Enkripsi Kuromi</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-image: url('PASTE_LINK_GAMBAR_DISINI');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 0, 30, 0.55);
            z-index: 0;
        }

        .card {
            background: rgba(20, 5, 45, 0.8);
            border: 2px solid #7c3aed;
            border-radius: 24px;
            padding: 45px 35px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.4);
            backdrop-filter: blur(10px);
        }

        .stars { position: absolute; top: 14px; right: 18px; font-size: 16px; opacity: 0.5; color: #c4b5fd; }
        .bow { font-size: 36px; margin-bottom: 6px; }
        h2 { font-size: 26px; font-weight: 800; color: #e2d4f0; margin-bottom: 6px; letter-spacing: 1px; }
        .subtitle { font-size: 13px; color: #a78bca; margin-bottom: 24px; font-style: italic; }

        .result-box {
            background: rgba(124, 58, 237, 0.15);
            border: 1.5px solid #5b21b6;
            border-radius: 16px;
            padding: 24px;
            margin: 20px 0;
        }

        .result-label { font-size: 13px; color: #a78bca; margin-bottom: 10px; font-weight: 700; }
        .result-name { font-size: 24px; font-weight: 800; color: #e2d4f0; letter-spacing: 3px; word-break: break-all; }
        .note { font-size: 13px; color: #7c5fa0; margin-bottom: 20px; font-style: italic; }

        .back-btn {
            display: block;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            color: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }
        .back-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <div class="stars">✦ ✦</div>
        <div class="bow">🎀</div>
        <h2>Hasil Enkripsi!</h2>
        <p class="subtitle">~ nyehehehe, ini nama rahasiamu ~</p>
        <div class="result-box">
            <p class="result-label">☆ Nama Terenkripsi ☆</p>
            <p class="result-name">{{ nama }}</p>
        </div>
        <p class="note">Selamat datang di pemrograman Python! 🖤</p>
        <a href="/" class="back-btn">🎀 Kembali</a>
    </div>
</body>
</html>
